name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Configuration de l'identité Git
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 2. SUPPRESSION DU FICHIER LOURD AVANT LE PUSH
          # On le supprime et on valide cette suppression localement pour le runner
          rm -f yolo11s-pose.pt
          git rm --cached model_weights.pt || true
          rm -f model_weights.pt
          git rm --cached yolo11s-pose.pt || true
          git commit -m "Temp: Suppression du modele pour le déploiement" || true
          
          # 3. Ajout du dépôt distant Hugging Face
          git remote add space https://huggingface.co/spaces/HRM237/Examen-Git-IABD-Hamad-Rassem-Mahamat-Master-2 || true
          
          # 4. Push vers Hugging Face
          git push --force https://token:$HF_TOKEN@huggingface.co/spaces/HRM237/Examen-Git-IABD-Hamad-Rassem-Mahamat-Master-2 main
