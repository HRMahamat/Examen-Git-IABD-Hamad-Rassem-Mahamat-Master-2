name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Configuration de l'identité Git
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 2. Initialisation et configuration essentielle de Git LFS pour le Push
          git lfs install
          
          # 3. Ajout du dépôt distant Hugging Face
          git remote add space https://huggingface.co/spaces/HRM237/Examen-Git-IABD-Hamad-Rassem-Mahamat-Master-2 || true
          
          # 4. Push forcé (Git LFS interceptera automatiquement le fichier yolo11s-pose.pt)
          git push --force https://token:$HF_TOKEN@huggingface.co/spaces/HRM237/Examen-Git-IABD-Hamad-Rassem-Mahamat-Master-2 main
